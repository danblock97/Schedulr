name: Feature request
description: Suggest an improvement or new capability for Schedulr
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Schedulr. A little context helps us evaluate feature requests much faster.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the need, frustration, or workflow gap.
      placeholder: It is hard to see overlapping availability across multiple groups at once.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the feature or behavior you want.
      placeholder: I would like a combined availability overlay for selected groups in the calendar.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional, but helpful if you've tried other approaches.
      placeholder: I currently export screenshots and compare them manually.
  - type: dropdown
    id: area
    attributes:
      label: Which area of the app does this relate to?
      options:
        - Calendar
        - Availability
        - AI assistant
        - Notifications
        - Groups
        - Subscription
        - Onboarding
        - Other
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Share mockups, examples, or anything else that would help.
      placeholder: Add links, screenshots, or notes here.
